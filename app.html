<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Блог - Нотатки про життя</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col min-h-screen bg-gray-100 font-sans text-gray-800">

    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-wider">МійБлог</a>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:text-indigo-200 transition">Про додаток</a></li>
                <li><a href="app.html" class="font-semibold border-b-2 border-white pb-1">Блог</a></li>
                <li><a href="profile.html" class="hover:text-indigo-200 transition">Профіль</a></li>
                <li><a href="#" id="logout-btn" class="hover:text-indigo-200 transition">Вихід</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow max-w-4xl">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Нотатки та пригоди</h1>
            <button id="show-form-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded shadow transition duration-200">
                + Новий запис
            </button>
        </div>

        <div id="post-form-container" class="hidden bg-white p-6 rounded-lg shadow-sm mb-8 border border-gray-200 transition-all">
            <h2 class="text-xl font-semibold mb-4 text-indigo-700">Про що ви думаєте сьогодні?</h2>
            <form id="post-form">
                <div class="mb-3">
                    <input type="text" id="post-title" required 
                           placeholder="Заголовок розповіді..." 
                           class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-3">
                    <textarea id="post-body" rows="3" required 
                              placeholder="Напишіть щось цікаве..." 
                              class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div class="flex space-x-3">
                    <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded transition duration-200">
                        Опублікувати
                    </button>
                    <button type="button" id="cancel-post-btn" class="text-gray-500 hover:text-gray-700 px-4 py-2">
                        Скасувати
                    </button>
                </div>
            </form>
        </div>

        <div id="posts-container" class="space-y-6">
            <div class="text-center py-10">
                <p class="text-gray-500">Завантаження дописів...</p>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-gray-300 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 Лабораторна робота №1.</p>
        </div>
    </footer>

    <script src="Model.js"></script>
    <script src="View.js"></script>
    <script src="Controller.js"></script>
    <script src="main.js"></script>

</body>
</html>
