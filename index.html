<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>МійБлог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

<nav class="bg-indigo-600 text-white p-4 flex justify-between">
    <a href="index.html" class="font-bold">МійБлог</a>
    <ul class="flex gap-4">
        <li><a href="app.html">Блог</a></li>
        <li><a href="profile.html">Профіль</a></li>
        <li id="nav-auth"></li>
    </ul>
</nav>

<main class="flex-grow flex flex-col items-center justify-center">
    <h1 class="text-3xl font-bold mb-4">Вітаємо!</h1>
    <div id="hero"></div>
</main>

<script src="main.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const nav = document.getElementById('nav-auth');
    const hero = document.getElementById('hero');

    if (user) {
        nav.innerHTML = `<a href="#" id="logout-btn">Вихід</a>`;
        hero.innerHTML = `<a href="app.html">Перейти в блог</a>`;
    } else {
        nav.innerHTML = `<a href="login.html">Вхід</a>`;
        hero.innerHTML = `<a href="register.html">Реєстрація</a>`;
    }
});
</script>

</body>
</html>
