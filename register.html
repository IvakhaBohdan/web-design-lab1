<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - МійБлог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between">
            <a href="index.html" class="font-bold">МійБлог</a>
            <div class="space-x-4">
                <a href="app.html">Блог</a>
                <a href="login.html">Вхід</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-center text-indigo-700">Реєстрація</h1>
            <form id="register-form">
                <div class="mb-4">
                    <label class="block mb-1 font-semibold">Ім'я</label>
                    <input type="text" id="name" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block mb-1 font-semibold">Email</label>
                    <input type="email" id="email" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block mb-1 font-semibold">Пароль</label>
                    <input type="password" id="password" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block mb-1 font-semibold">Стать</label>
                    <select id="gender" class="w-full p-2 border rounded">
                        <option value="male">Чоловіча</option>
                        <option value="female">Жіноча</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block mb-1 font-semibold">Дата народження</label>
                    <input type="date" id="dob" class="w-full p-2 border rounded" required>
                </div>
                <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600 font-bold">Зареєструватися</button>
            </form>
        </div>
    </main>

    <script src="Model.js"></script>
    <script src="View.js"></script>
    <script src="Controller.js"></script>
    <script src="main.js"></script>
</body>
</html>
