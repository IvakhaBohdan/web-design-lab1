<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - МійБлог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between">
            <a href="index.html" class="font-bold">МійБлог</a>
            <a href="login.html" class="hover:underline">Вхід</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <form id="register-form" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md space-y-4">
            <h2 class="text-2xl font-bold text-center text-indigo-600">Створити профіль</h2>
            <input type="text" id="name" placeholder="Повне ім'я" required class="w-full p-2 border rounded">
            <input type="email" id="email" placeholder="Email" required class="w-full p-2 border rounded">
            <input type="password" id="password" placeholder="Пароль" required class="w-full p-2 border rounded">
            <div class="flex space-x-2">
                <select id="gender" class="w-1/2 p-2 border rounded">
                    <option value="male">Чоловіча</option>
                    <option value="female">Жіноча</option>
                </select>
                <input type="date" id="dob" required class="w-1/2 p-2 border rounded">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition">Зареєструватися</button>
        </form>
    </main>

    <script src="Model.js"></script>
    <script src="View.js"></script>
    <script src="Controller.js"></script>
    <script src="main.js"></script>
</body>
</html>
